<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GigShield — Trigger-Based Insurance</title>
<meta name="description" content="Income protection for gig workers with trigger-based automatic payouts"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0B0F1A;--surf:#131929;--card:#1A2236;--bdr:#1f2e47;
  --acc:#F97316;--accg:rgba(249,115,22,.12);
  --grn:#22C55E;--grng:rgba(34,197,94,.12);
  --yel:#F59E0B;--yelg:rgba(245,158,11,.12);
  --red:#EF4444;--redg:rgba(239,68,68,.12);
  --blu:#3B82F6;--blug:rgba(59,130,246,.12);
  --pur:#A855F7;--purg:rgba(168,85,247,.12);
  --txt:#EEF2FF;--sub:#8B9CC8;--muted:#44547A;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Instrument Sans',sans-serif;display:flex;align-items:center;justify-content:center}
.jak{font-family:'Plus Jakarta Sans',sans-serif}

/* SHELL */
.app-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.shell{width:390px;height:844px;background:var(--surf);border-radius:50px;border:1.5px solid var(--bdr);overflow:hidden;position:relative;flex-shrink:0;box-shadow:0 40px 100px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.03) inset,inset 0 1px 0 rgba(255,255,255,.05)}
.island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#000;border-radius:20px;z-index:20}
.scr{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-top:56px}
.scr::-webkit-scrollbar{display:none}
.dot-nav{display:flex;gap:7px;align-items:center;justify-content:center;margin-top:18px}
.dot{height:8px;border-radius:4px;cursor:pointer;transition:all .25s ease}

/* TOAST */
#toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:350px}
.toast{padding:12px 16px;border-radius:14px;font-size:13px;font-weight:500;animation:toastIn .3s ease both;pointer-events:auto;display:flex;gap:10px;align-items:flex-start;border:1px solid}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.toast-out{animation:toastOut .25s ease both}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
.toast-ok{background:var(--grng);border-color:rgba(34,197,94,.3);color:var(--grn)}
.toast-warn{background:var(--yelg);border-color:rgba(245,158,11,.3);color:var(--yel)}
.toast-bad{background:var(--redg);border-color:rgba(239,68,68,.3);color:var(--red)}
.toast-info{background:var(--card);border-color:var(--bdr);color:var(--txt)}

/* SHARED UI */
.sbar{display:flex;justify-content:space-between;align-items:center;padding:0 26px 4px;font-size:12px;font-weight:600;color:var(--sub)}
.prog-wrap{height:3px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-bottom:20px}
.prog-bar{height:100%;background:var(--acc);border-radius:3px;transition:width .5s ease}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:18px}
.card-sm{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px}
.div{height:1px;background:var(--bdr)}
.lbl{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;display:block}
.hint{font-size:12px;color:var(--muted);margin-top:5px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}

.fld{width:100%;padding:13px 15px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;color:var(--txt);font-size:15px;font-family:'Instrument Sans',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fld:focus{border-color:var(--acc)}
.fld::placeholder{color:var(--muted)}

.btn{width:100%;padding:15px;background:var(--acc);color:#fff;border:none;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s}
.btn:hover{background:#e8640a;transform:translateY(-1px);box-shadow:0 10px 28px rgba(249,115,22,.28)}
.btn:active{transform:translateY(0);box-shadow:none}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-ghost{width:100%;padding:14px;background:transparent;color:var(--sub);border:1px solid var(--bdr);border-radius:14px;font-family:'Instrument Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .18s}
.btn-ghost:hover{border-color:var(--muted);color:var(--txt)}
.btn-sm{padding:7px 14px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s}
.btn-sm:hover{background:#e8640a}
.btn-sm-ghost{padding:7px 14px;background:transparent;color:var(--sub);border:1px solid var(--bdr);border-radius:9px;font-family:'Instrument Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .18s}
.btn-sm-ghost:hover{border-color:var(--acc);color:var(--acc)}
.btn-grn{width:100%;padding:15px;background:var(--grn);color:#fff;border:none;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s}
.btn-grn:hover{background:#1aae4f;transform:translateY(-1px);box-shadow:0 10px 28px rgba(34,197,94,.28)}
.btn-grn:active{transform:translateY(0)}
.btn-grn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-red{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s}
.btn-red:hover{background:#dc3030}

.seg-row{display:flex;gap:8px}
.seg{flex:1;padding:13px 6px;background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:6px}
.seg.on{border-color:var(--acc);background:var(--accg)}
.seg.on .slbl{color:var(--acc)}
.slbl{font-size:11px;font-weight:600;color:var(--sub)}
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.area-tile{padding:10px 12px;background:var(--card);border:1.5px solid var(--bdr);border-radius:11px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--sub);text-align:left;font-family:'Instrument Sans',sans-serif}
.area-tile:hover{border-color:var(--muted);color:var(--txt)}
.area-tile.on{border-color:var(--acc);background:var(--accg);color:var(--acc);font-weight:600}
.otp-row{display:flex;gap:8px;justify-content:center}
.otp-c{width:48px;height:56px;background:var(--card);border:1.5px solid var(--bdr);border-radius:11px;text-align:center;font-size:20px;font-weight:700;color:var(--txt);font-family:'Plus Jakarta Sans',sans-serif;outline:none;caret-color:var(--acc);transition:border-color .18s}
.otp-c:focus,.otp-c.on{border-color:var(--acc);background:var(--accg)}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);display:flex;padding:8px 0 20px}
.bnav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.bnav-lbl{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}

/* TRIGGER CARDS */
.trig-card{padding:14px;border-radius:14px;border:1.5px solid var(--bdr);background:var(--card);margin-bottom:10px;transition:all .3s;cursor:pointer}
.trig-card.active{border-color:var(--red);background:var(--redg);animation:trigPulse 2s infinite}
.trig-card .trig-head{display:flex;justify-content:space-between;align-items:center}
.trig-card .trig-body{margin-top:8px;font-size:12px;color:var(--sub);line-height:1.5}
@keyframes trigPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 16px 2px rgba(239,68,68,.15)}}

/* TOGGLE */
.toggle-wrap{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle-input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--bdr);border-radius:13px;cursor:pointer;transition:background .25s}
.toggle-input:checked+.toggle-track{background:var(--grn)}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .25s;pointer-events:none}
.toggle-input:checked~.toggle-knob{transform:translateX(22px)}

/* CLAIM ROW */
.claim-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bdr)}
.claim-item:last-child{border-bottom:none}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge-g{background:var(--grng);color:var(--grn);border:1px solid rgba(34,197,94,.3)}
.badge-y{background:var(--yelg);color:var(--yel);border:1px solid rgba(245,158,11,.3)}
.badge-r{background:var(--redg);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-b{background:var(--blug);color:var(--blu);border:1px solid rgba(59,130,246,.3)}
.badge-p{background:var(--purg);color:var(--pur);border:1px solid rgba(168,85,247,.3)}

/* ADMIN TRIGGER PANEL */
.admin-trig{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surf);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;transition:all .25s}
.admin-trig.on{border-color:var(--red);background:rgba(239,68,68,.06)}
.admin-trig .at-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.admin-trig .at-info{flex:1;min-width:0}
.admin-trig .at-label{font-size:13px;font-weight:600}
.admin-trig .at-sub{font-size:11px;color:var(--muted);margin-top:1px}
.admin-trig .at-payout{font-size:12px;font-weight:700;color:var(--grn);margin-top:3px}

/* INNER SCROLL */
.inner-scroll{overflow-y:auto;scrollbar-width:none}
.inner-scroll::-webkit-scrollbar{display:none}

/* ANIMATIONS */
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes ripple{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.8);opacity:0}}
@keyframes pop{0%{transform:scale(.3);opacity:0}65%{transform:scale(1.08)}85%{transform:scale(.97)}100%{transform:scale(1);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.au{animation:up .42s ease both}
.af{animation:fade .28s ease both}
.rring{animation:ripple 2s ease infinite}

</style>
</head>
<body>
<div id="toast-wrap"></div>
<div class="app-wrap">
  <div class="shell" id="shell">
    <div class="island"></div>
    <div class="scr af" id="screen"></div>
  </div>
  <div class="dot-nav" id="dots"></div>
</div>
<script>
/* GigShield — Trigger-Based Payout System */

// ── DATABASE ──────────────────────────────────────────
const DB = { users: [], policies: [], claims: [], events: [] };

// ── TRIGGERS ──────────────────────────────────────────
const TRIGGERS = [
  { id: "rain", icon: "🌧️", label: "Heavy Rain / Flood", desc: "Red alert rainfall or urban flooding disrupting deliveries", payout: 350, color: "var(--blu)", bg: "var(--blug)" },
  { id: "aqi", icon: "😷", label: "Severe Air Quality", desc: "AQI exceeds 300 — hazardous for outdoor workers", payout: 250, color: "var(--red)", bg: "var(--redg)" },
  { id: "bandh", icon: "🚫", label: "Bandh / Strike", desc: "Official bandh or Section 144 imposed in area", payout: 400, color: "var(--yel)", bg: "var(--yelg)" },
  { id: "downtime", icon: "⚙️", label: "Platform Downtime", desc: "Zomato/Swiggy app outage lasting 2+ hours", payout: 200, color: "var(--pur)", bg: "var(--purg)" },
  { id: "heat", icon: "🌡️", label: "Extreme Heatwave", desc: "Temperature exceeds 45°C — IMD red alert", payout: 300, color: "var(--acc)", bg: "var(--accg)" },
];

// ── CITY DATA ─────────────────────────────────────────
const CITY_AREAS = {
  "Bengaluru": ["Koramangala", "Indiranagar", "HSR Layout", "Whitefield", "Jayanagar", "Electronic City"],
  "Mumbai": ["Andheri", "Bandra", "Kurla", "Dharavi", "Borivali", "Dadar"],
  "Delhi NCR": ["Connaught Place", "Rohini", "Dwarka", "Noida Sec 18", "Gurgaon", "Saket"],
  "Chennai": ["T. Nagar", "Adyar", "Velachery", "Anna Nagar", "OMR", "Tambaram"],
  "Hyderabad": ["Banjara Hills", "Hitech City", "Gachibowli", "Ameerpet", "Secunderabad", "Kukatpally"],
};

// ── APP STATE ─────────────────────────────────────────
const S = {
  screen: 0, role: "", // "user" or "admin"
  name: "", phone: "", upi: "", platform: "", city: "", area: "", earnings: 0, tenure: 6,
  otpSent: false, otp: Array(6).fill(""), kycOk: false, pStep: 1,
  user: null, policy: null,
  adminPin: "1234", adminAuth: false,
  activeTriggers: {}, // id -> {active:bool, ts:number}
  tab: "home", adminTab: "triggers",
};

// ── HELPERS ───────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 9);
const fmt = n => "₹" + Number(n).toLocaleString("en-IN");
const timeAgo = ts => { const m = Math.floor((Date.now() - ts) / 60000); return m < 1 ? "Just now" : m < 60 ? m + "m ago" : Math.floor(m / 60) + "h ago"; };
const sbar = (t = "9:41") => `<div class="sbar"><span>${t}</span><div style="display:flex;gap:5px;align-items:center;font-size:11px"><span>●●●</span><span>WiFi</span><span>🔋</span></div></div>`;
const prog = p => `<div class="prog-wrap"><div class="prog-bar" style="width:${p}%"></div></div>`;
const hdr = (s, t) => `<div style="margin-bottom:18px"><div style="font-size:11px;color:var(--acc);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px">${s}</div><div class="jak" style="font-size:23px;font-weight:800;line-height:1.2">${t}</div></div>`;

function toast(msg, type = "info", icon = "ℹ️", ms = 4500) {
  const w = document.getElementById("toast-wrap"), el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span style="font-size:16px;flex-shrink:0">${icon}</span><span>${msg}</span>`;
  w.appendChild(el);
  setTimeout(() => { el.classList.add("toast-out"); setTimeout(() => el.remove(), 300); }, ms);
}

function getActiveTriggers() { return TRIGGERS.filter(t => S.activeTriggers[t.id]?.active); }
function getTotalPayout() { return getActiveTriggers().reduce((s, t) => s + t.payout, 0); }

// ── CLAIMS ────────────────────────────────────────────
function processClaim(user, trigger) {
  const c = {
    id: "CLM" + Date.now().toString().slice(-8),
    userId: user.id, userName: user.name, trigId: trigger.id,
    trigLabel: trigger.label, trigIcon: trigger.icon,
    amount: trigger.payout, status: "paid", ts: Date.now(),
  };
  DB.claims.unshift(c);
  return c;
}

// ── USER LOGOUT ──────────────────────────────────────
function userLogout() {
  // Clear session state — DB.claims, DB.users, DB.policies, activeTriggers all persist
  S.name = ""; S.phone = ""; S.upi = ""; S.platform = ""; S.city = ""; S.area = "";
  S.earnings = 0; S.tenure = 6; S.otpSent = false; S.otp = Array(6).fill("");
  S.kycOk = false; S.pStep = 1; S.user = null; S.policy = null;
  S.role = ""; S.tab = "home";
  toast("Logged out successfully", "info", "👋", 3000);
  go(1);
}

// ── NAVIGATION ────────────────────────────────────────
const SCREENS = ["splash", "roleSelect", "otp", "kyc", "profile", "quote", "userDash", "adminLogin", "adminDash"];
function go(i) { S.screen = Math.max(0, Math.min(i, SCREENS.length - 1)); render(); }
function render() {
  const el = document.getElementById("screen");
  el.className = "scr af"; void el.offsetWidth;
  el.innerHTML = FNS[SCREENS[S.screen]]();
  dots(); bind();
}
function dots() {
  const d = document.getElementById("dots");
  // Only show dots for user onboarding flow
  if (S.role === "admin" || S.screen >= 6) { d.innerHTML = ""; return; }
  const flow = [0, 1, 2, 3, 4, 5];
  d.innerHTML = flow.map((_, i) => `<div class="dot" data-i="${i}" style="width:${i === S.screen ? 22 : 8}px;background:${i === S.screen ? "var(--acc)" : i < S.screen ? "var(--grn)" : "var(--bdr)"}"></div>`).join("");
}

// ══════════════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════════════
const FNS = {

splash: () => `
<div style="padding:16px 24px 36px;height:100%;display:flex;flex-direction:column">
  ${sbar()}
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <div class="au">
      <div style="width:68px;height:68px;border-radius:20px;background:linear-gradient(145deg,#F97316,#c2571a);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:20px;box-shadow:0 14px 36px rgba(249,115,22,.32)">🛡️</div>
      <div class="jak" style="font-size:32px;font-weight:800;line-height:1.1;margin-bottom:6px">Gig<span style="color:var(--acc)">Shield</span></div>
      <div style="font-size:14px;color:var(--sub);line-height:1.65;margin-bottom:24px">Income protection for delivery partners.<br>Automatic payouts when disruptions hit.</div>
      ${[["⚡","5 trigger events — rain, AQI, bandh & more"],["💸","Instant UPI payout on trigger activation"],["🔒","Admin-controlled · Verified claims only"]].map(([ic, tx], i) => `
        <div class="au" style="display:flex;gap:12px;align-items:flex-start;margin-bottom:11px;animation-delay:${i * .08}s">
          <div style="width:30px;height:30px;border-radius:9px;background:var(--accg);border:1px solid rgba(249,115,22,.2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${ic}</div>
          <span style="font-size:13px;color:var(--sub);line-height:1.55;padding-top:5px">${tx}</span>
        </div>`).join("")}
    </div>
    <div class="au" style="animation-delay:.28s;display:flex;flex-direction:column;gap:10px;margin-top:6px">
      <button class="btn" id="btn-start">Get Started</button>
      <div style="text-align:center;font-size:12px;color:var(--muted)">For gig delivery partners & administrators</div>
    </div>
  </div>
</div>`,

roleSelect: () => `
<div style="padding:16px 24px 36px;height:100%;display:flex;flex-direction:column">
  ${sbar()}
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <div class="au">
      ${hdr("SELECT ROLE", "How are you using GigShield?")}
      <div style="display:flex;flex-direction:column;gap:12px">
        <button class="card au" id="btn-role-user" style="cursor:pointer;text-align:left;border:1.5px solid var(--bdr);transition:all .2s">
          <div style="display:flex;gap:14px;align-items:center">
            <div style="width:52px;height:52px;border-radius:16px;background:var(--grng);border:1px solid rgba(34,197,94,.2);display:flex;align-items:center;justify-content:center;font-size:24px">🛵</div>
            <div>
              <div class="jak" style="font-size:17px;font-weight:700;margin-bottom:3px">Gig Worker</div>
              <div style="font-size:12px;color:var(--sub);line-height:1.5">Delivery partner on Zomato, Swiggy, etc.<br>View triggers & claim payouts</div>
            </div>
          </div>
        </button>
        <button class="card au" id="btn-role-admin" style="cursor:pointer;text-align:left;border:1.5px solid var(--bdr);transition:all .2s;animation-delay:.1s">
          <div style="display:flex;gap:14px;align-items:center">
            <div style="width:52px;height:52px;border-radius:16px;background:var(--purg);border:1px solid rgba(168,85,247,.2);display:flex;align-items:center;justify-content:center;font-size:24px">🔐</div>
            <div>
              <div class="jak" style="font-size:17px;font-weight:700;margin-bottom:3px">Administrator</div>
              <div style="font-size:12px;color:var(--sub);line-height:1.5">Control triggers, manage payouts,<br>oversee claims pipeline</div>
            </div>
          </div>
        </button>
      </div>
    </div>
  </div>
</div>`,

adminLogin: () => `
<div style="padding:16px 24px 36px;height:100%;display:flex;flex-direction:column">
  ${sbar()}
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
    <div class="au">
      <div style="width:60px;height:60px;border-radius:18px;background:var(--purg);border:1px solid rgba(168,85,247,.2);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px">🔐</div>
      ${hdr("ADMIN ACCESS", "Enter admin PIN")}

        <div class="jak" style="font-size:20px;font-weight:800">GigShield 🔐</div>
      </div>
      <button id="btn-admin-logout" style="padding:6px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--sub);font-size:11px;cursor:pointer;font-family:inherit">Logout</button>
    </div>
    <div class="inner-scroll" style="flex:1;padding:10px 20px 78px">${content}</div>
    <div class="bnav">
      ${[["⚡", "Triggers", "triggers"], ["📋", "Claims", "claims"]].map(([ic, lb, id]) => `
        <button class="bnav-btn" data-admtab="${id}" style="color:${S.adminTab === id ? "var(--acc)" : "var(--muted)"}">
          <div style="position:relative;display:inline-block">
            <span style="font-size:20px">${ic}</span>
            ${id === "claims" && DB.claims.length > 0 ? `<span style="position:absolute;top:-4px;right:-6px;min-width:14px;height:14px;background:var(--grn);border-radius:7px;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;line-height:1">${DB.claims.length}</span>` : ""}
          </div>
          <span class="bnav-lbl">${lb}</span>
        </button>`).join("")}
    </div>
  </div>`;
},
}; // end FNS

// ══════════════════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════════════════
function bind() {
  const on = (id, ev, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); };
  const q = (s, fn) => document.querySelectorAll(s).forEach(fn);

  on("btn-start", "click", () => go(1));

  // Role select
  on("btn-role-user", "click", () => { S.role = "user"; go(2); });
  on("btn-role-admin", "click", () => { S.role = "admin"; go(7); });

  // Admin login
  on("inp-pin", "input", e => {
    const b = document.getElementById("btn-admin-login");
    if (b) b.disabled = e.target.value.length < 4;
  });
  on("btn-admin-login", "click", () => {
    const pin = document.getElementById("inp-pin")?.value;
    if (pin === S.adminPin) { S.adminAuth = true; toast("Welcome, Admin", "ok", "🔐"); go(8); }
    else { toast("Invalid PIN", "bad", "🚫"); document.getElementById("inp-pin").style.animation = "shake .4s ease"; }
  });
  on("btn-admin-back", "click", () => go(1));
  on("btn-admin-logout", "click", () => { S.adminAuth = false; S.role = ""; go(1); });

  // OTP
  const syncSendBtn = () => {
    const n = document.getElementById("inp-name"), p = document.getElementById("inp-phone"), b = document.getElementById("btn-send");
    if (b) b.disabled = !(n?.value.trim() && p?.value.length >= 10);
  };
  on("inp-name", "input", e => { S.name = e.target.value.trim(); syncSendBtn(); });
  on("inp-phone", "input", e => { S.phone = e.target.value.replace(/\D/g, "").slice(0, 10); syncSendBtn(); });
  on("btn-send", "click", () => {
    const b = document.getElementById("btn-send");
    if (b) { b.textContent = "Sending…"; b.disabled = true; }
    setTimeout(() => { S.otpSent = true; render(); }, 1000);
  });
  q(".otp-c", el => {
    el.addEventListener("input", e => {
      const i = +el.dataset.i; S.otp[i] = e.target.value.slice(-1);
      el.className = "otp-c" + (S.otp[i] ? " on" : "");
      const nxt = document.querySelector(`.otp-c[data-i="${i + 1}"]`);
      if (e.target.value && nxt) nxt.focus();
      if (S.otp.every(d => d)) setTimeout(() => go(3), 450);
    });
    el.addEventListener("keydown", e => {
      if (e.key === "Backspace" && !S.otp[+el.dataset.i]) {
        const p = document.querySelector(`.otp-c[data-i="${+el.dataset.i - 1}"]`);
        if (p) p.focus();
      }
    });
  });
  on("btn-verify", "click", () => go(3));

  // KYC
  const kycChk = () => {
    const a = document.getElementById("inp-aadh"), u = document.getElementById("inp-upi"), b = document.getElementById("btn-kyc");
    if (b) b.disabled = !(a?.value.replace(/\s/g, "").length >= 12 && u?.value.includes("@"));
  };
  on("inp-aadh", "input", e => {
    let d = e.target.value.replace(/\D/g, "").slice(0, 12);
    e.target.value = d.replace(/(\d{4})(\d{0,4})(\d{0,4})/, "$1 $2 $3").trim();
    kycChk();
  });
  on("inp-upi", "input", kycChk);
  on("btn-kyc", "click", () => {
    S.upi = document.getElementById("inp-upi")?.value.trim();
    const b = document.getElementById("btn-kyc");
    if (b) { b.textContent = "Checking…"; b.disabled = true; b.style.animation = "breathe 1s infinite"; }
    S.user = { id: uid(), name: S.name, phone: S.phone, upi: S.upi, area: "", city: "", earnings: 0 };
    DB.users.push(S.user);
    setTimeout(() => { S.kycOk = true; render(); }, 1400);
  });
  on("btn-kyc-next", "click", () => { S.pStep = 1; go(4); });

  // Profile
  q("[data-plat]", el => el.addEventListener("click", () => {
    S.platform = el.dataset.plat;
    q("[data-plat]", e => e.classList.toggle("on", e.dataset.plat === S.platform));
    const b = document.getElementById("btn-p1"); if (b) b.disabled = !S.platform || !S.city;
  }));
  on("sel-city", "change", e => { S.city = e.target.value; S.area = ""; const b = document.getElementById("btn-p1"); if (b) b.disabled = !S.platform || !S.city; });
  on("btn-p1", "click", () => { if (S.platform && S.city) { S.pStep = 2; render(); } });
  q("[data-area]", el => el.addEventListener("click", () => {
    S.area = el.dataset.area;
    q("[data-area]", e => e.classList.toggle("on", e.dataset.area === S.area));
    const b = document.getElementById("btn-p2"); if (b) b.disabled = false;
  }));
  on("btn-p2back", "click", () => { S.pStep = 1; render(); });
  on("btn-p2", "click", () => { if (S.area) { S.pStep = 3; render(); } });
  on("inp-earn", "input", e => {
    const raw = e.target.value.replace(/[^0-9]/g, "");
    if (e.target.value !== raw) e.target.value = raw;
    S.earnings = parseInt(raw) || 0;
    const b = document.getElementById("btn-p3"); if (b) b.disabled = !S.earnings || S.earnings < 500;
  });
  on("btn-p3back", "click", () => { S.pStep = 2; render(); });
  on("btn-p3", "click", () => {
    if (!S.earnings || S.earnings < 500) return;
    if (S.user) Object.assign(S.user, { area: S.area, city: S.city, earnings: S.earnings });
    go(5);
  });

  // Quote
  on("btn-activate", "click", () => {
    const b = document.getElementById("btn-activate");
    if (b) { b.textContent = "⚡ Activating…"; b.disabled = true; b.style.animation = "breathe 1s infinite"; }
    S.policy = { id: "POL" + uid(), userId: S.user?.id, status: "active", premium: 49, area: S.area, city: S.city };
    DB.policies.push(S.policy);
    toast("🛡️ Shield activated! You'll see payouts when triggers fire.", "ok", "🛡️", 5000);
    setTimeout(() => go(6), 1300);
  });

  // User dash tabs
  q("[data-tab]", el => el.addEventListener("click", () => { S.tab = el.dataset.tab; render(); }));

  // User logout
  on("btn-user-logout", "click", userLogout);

  // Claim payout
  on("btn-claim", "click", () => {
    const active = getActiveTriggers();
    const myClaims = DB.claims.filter(c => c.userId === S.user?.id);
    const canClaim = active.filter(t => !myClaims.some(c => c.trigId === t.id && Date.now() - c.ts < 3600000));
    if (canClaim.length === 0) { toast("Already claimed for current triggers", "warn", "⚠️"); return; }
    let total = 0;
    canClaim.forEach(t => { const c = processClaim(S.user, t); total += c.amount; });
    toast(`💸 ${fmt(total)} credited to ${S.upi}!`, "ok", "💸", 6000);
    render();
  });

  // Admin dash tabs
  q("[data-admtab]", el => el.addEventListener("click", () => { S.adminTab = el.dataset.admtab; render(); }));

  // Admin trigger toggles
  q(".toggle-input[data-trig]", el => el.addEventListener("change", e => {
    const id = el.dataset.trig;
    S.activeTriggers[id] = { active: e.target.checked, ts: Date.now() };
    const trig = TRIGGERS.find(t => t.id === id);
    if (e.target.checked) {
      toast(`${trig.icon} ${trig.label} activated — users can now claim ${fmt(trig.payout)}`, "bad", trig.icon, 5000);
    } else {
      toast(`${trig.icon} ${trig.label} deactivated`, "info", trig.icon, 3000);
    }
    render();
  }));

  on("btn-all-off", "click", () => {
    TRIGGERS.forEach(t => S.activeTriggers[t.id] = { active: false, ts: 0 });
    toast("All triggers deactivated", "info", "✅");
    render();
  });
}

// ── BOOT ──────────────────────────────────────────────
render();

</script>
</body>
</html>
